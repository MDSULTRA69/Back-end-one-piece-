services:
  - type: web
    name: onepiecedaily-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: onepiecedaily-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-netlify-site.netlify.app

databases:
  - name: onepiecedaily-db
    plan: free
    databaseName: onepiecedaily
